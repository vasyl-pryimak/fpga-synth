<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spring Reverb</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111;
  color: #ccc;
  font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 32px;
}

h1 {
  font-size: 11px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #444;
}

/* ── Panel ── */
.panel {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 16px;
  padding: 40px 56px;
  display: flex;
  align-items: center;
  gap: 48px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}

/* ── Knob ── */
.knob-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  user-select: none;
}

.knob-ring {
  position: relative;
  width: 96px;
  height: 96px;
}

.knob-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.arc-track { fill: none; stroke: #2a2a2a; stroke-width: 4; stroke-linecap: round; }
.arc-fill  { fill: none; stroke: #e8622a; stroke-width: 4; stroke-linecap: round; transition: stroke-dasharray 0.05s; }

.knob-body {
  position: absolute;
  top: 10px; left: 10px;
  width: 76px; height: 76px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #3a3a3a, #141414);
  box-shadow:
    0 4px 16px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.07);
  cursor: ns-resize;
  transition: box-shadow 0.1s;
}

.knob-body:hover {
  box-shadow:
    0 4px 20px rgba(0,0,0,0.8),
    0 0 0 1px rgba(232,98,42,0.25),
    inset 0 1px 0 rgba(255,255,255,0.07);
}

.knob-body.dragging {
  box-shadow:
    0 4px 20px rgba(0,0,0,0.8),
    0 0 0 2px rgba(232,98,42,0.6),
    inset 0 1px 0 rgba(255,255,255,0.07);
  cursor: grabbing;
}

.knob-dot {
  position: absolute;
  top: 9px;
  left: 50%;
  transform: translateX(-50%);
  width: 5px; height: 5px;
  background: #e8622a;
  border-radius: 50%;
  box-shadow: 0 0 4px rgba(232,98,42,0.8);
}

.knob-label {
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #555;
}

.knob-value {
  font-size: 14px;
  color: #e8622a;
  letter-spacing: 1px;
}

/* ── Divider ── */
.divider {
  width: 1px;
  height: 80px;
  background: #2a2a2a;
}

/* ── Player ── */
.player {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  min-width: 220px;
}

.play-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: #e8622a;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s, transform 0.08s, opacity 0.2s;
  flex-shrink: 0;
}
.play-btn:hover:not(:disabled) { background: #f07840; }
.play-btn:active:not(:disabled) { transform: scale(0.93); }
.play-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.icon-play  { width: 0; height: 0; border: solid transparent; border-width: 10px 0 10px 18px; border-left-color: #fff; margin-left: 4px; }
.icon-pause { display: flex; gap: 5px; }
.icon-pause i { width: 4px; height: 20px; background: #fff; border-radius: 2px; display: block; }

.progress-area { width: 100%; }

.progress-bar {
  width: 100%;
  height: 3px;
  background: #2a2a2a;
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}

.progress-bar:hover { height: 5px; margin: -1px 0; }

.progress-filled {
  height: 100%;
  background: #e8622a;
  border-radius: 2px;
  width: 0%;
  pointer-events: none;
}

.time-row {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: #444;
  margin-top: 6px;
}

.status {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #444;
  min-height: 12px;
}
.status.rendering { color: #e8622a; }
.status.ready     { color: #4a9; }
.status.error     { color: #c44; }

/* ── Oscilloscope ── */
.scope-wrap {
  width: 100%;
  max-width: 700px;
  background: #0e0e0e;
  border: 1px solid #222;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

#scope {
  display: block;
  width: 100%;
  height: 96px;
}
</style>
</head>
<body>

<h1>Spring Reverb Simulator</h1>

<div class="panel">

  <div class="knob-wrap" id="k-volume" data-value="1.0">
    <div class="knob-ring">
      <svg class="knob-svg" viewBox="0 0 96 96">
        <path class="arc-track" id="volume-track"/>
        <path class="arc-fill"  id="volume-fill"/>
      </svg>
      <div class="knob-body" id="kb-volume"><div class="knob-dot"></div></div>
    </div>
    <div class="knob-label">Volume</div>
    <div class="knob-value" id="kv-volume">1.00</div>
  </div>

  <div class="knob-wrap" id="k-wet" data-value="0.8">
    <div class="knob-ring">
      <svg class="knob-svg" viewBox="0 0 96 96">
        <path class="arc-track" id="wet-track"/>
        <path class="arc-fill"  id="wet-fill"/>
      </svg>
      <div class="knob-body" id="kb-wet"><div class="knob-dot"></div></div>
    </div>
    <div class="knob-label">Wet</div>
    <div class="knob-value" id="kv-wet">0.80</div>
  </div>

  <div class="player">
    <button class="play-btn" id="play-btn" disabled>
      <div class="icon-play" id="play-icon"></div>
    </button>
    <div class="progress-area">
      <div class="progress-bar" id="progress-bar">
        <div class="progress-filled" id="progress-filled"></div>
      </div>
      <div class="time-row">
        <span id="t-cur">0:00</span>
        <span id="t-dur">0:00</span>
      </div>
    </div>
    <div class="status" id="status">initializing</div>
  </div>

  <div class="knob-wrap" id="k-decay" data-value="0.6">
    <div class="knob-ring">
      <svg class="knob-svg" viewBox="0 0 96 96">
        <path class="arc-track" id="decay-track"/>
        <path class="arc-fill"  id="decay-fill"/>
      </svg>
      <div class="knob-body" id="kb-decay"><div class="knob-dot"></div></div>
    </div>
    <div class="knob-label">Decay</div>
    <div class="knob-value" id="kv-decay">0.60</div>
  </div>

  <div class="knob-wrap" id="k-predelay" data-value="0.0">
    <div class="knob-ring">
      <svg class="knob-svg" viewBox="0 0 96 96">
        <path class="arc-track" id="predelay-track"/>
        <path class="arc-fill"  id="predelay-fill"/>
      </svg>
      <div class="knob-body" id="kb-predelay"><div class="knob-dot"></div></div>
    </div>
    <div class="knob-label">Pre-delay</div>
    <div class="knob-value" id="kv-predelay">0.00</div>
  </div>

</div>

<div class="scope-wrap">
  <canvas id="scope"></canvas>
</div>

<audio id="audio" preload="auto"></audio>

<script>
// ── Arc geometry ───────────────────────────────────────────────────────────
const CX = 48, CY = 48, R = 42;
// Range: 135° (bottom-left) → 45° (bottom-right), clockwise = 270° sweep
const A0 = 135 * Math.PI / 180;
const A1 = (135 + 270) * Math.PI / 180;

function pt(a) {
  return [CX + R * Math.cos(a), CY + R * Math.sin(a)];
}

function arcD(fromA, toA) {
  if (Math.abs(toA - fromA) < 0.001) return '';
  const sweep = ((toA - fromA) + 2*Math.PI) % (2*Math.PI);
  const large = sweep > Math.PI ? 1 : 0;
  const [x1,y1] = pt(fromA);
  const [x2,y2] = pt(toA);
  return `M${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${large} 1 ${x2.toFixed(2)},${y2.toFixed(2)}`;
}

const FULL_ARC = arcD(A0, A1);

function drawKnob(id, val) {
  document.getElementById(`${id}-track`).setAttribute('d', FULL_ARC);
  const fillEnd = A0 + val * (A1 - A0);
  document.getElementById(`${id}-fill`).setAttribute('d',
    val < 0.005 ? '' : arcD(A0, fillEnd));

  const body = document.getElementById(`kb-${id}`);
  const deg = val * 270 - 135;
  body.style.transform = `rotate(${deg}deg)`;

  document.getElementById(`kv-${id}`).textContent = val.toFixed(2);
}

// Init visuals
['volume','wet','decay','predelay'].forEach(id => {
  const wrap = document.getElementById(`k-${id}`);
  drawKnob(id, parseFloat(wrap.dataset.value));
});

// ── Knob drag ──────────────────────────────────────────────────────────────
let drag = null, dragY0 = 0, dragV0 = 0;

['volume','wet','decay','predelay'].forEach(id => {
  const body = document.getElementById(`kb-${id}`);
  body.addEventListener('mousedown', e => {
    const wrap = document.getElementById(`k-${id}`);
    drag   = id;
    dragY0 = e.clientY;
    dragV0 = parseFloat(wrap.dataset.value);
    body.classList.add('dragging');
    e.preventDefault();
  });
});

document.addEventListener('mousemove', e => {
  if (!drag) return;
  const delta = (dragY0 - e.clientY) / 140;
  const val = Math.max(0, Math.min(1, dragV0 + delta));
  document.getElementById(`k-${drag}`).dataset.value = val;
  drawKnob(drag, val);
  scheduleRender();
});

document.addEventListener('mouseup', () => {
  if (drag) {
    document.getElementById(`kb-${drag}`).classList.remove('dragging');
    drag = null;
  }
});

// ── Audio player ───────────────────────────────────────────────────────────
const audio    = document.getElementById('audio');
const playBtn  = document.getElementById('play-btn');
const progFill = document.getElementById('progress-filled');
const progBar  = document.getElementById('progress-bar');
const tCur     = document.getElementById('t-cur');
const tDur     = document.getElementById('t-dur');
const status   = document.getElementById('status');

function fmt(s) {
  s = isFinite(s) ? s : 0;
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}

function setPlayIcon(playing) {
  playBtn.innerHTML = playing
    ? '<div class="icon-pause"><i></i><i></i></div>'
    : '<div class="icon-play"></div>';
}

audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? audio.currentTime / audio.duration * 100 : 0;
  progFill.style.width = pct + '%';
  tCur.textContent = fmt(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  tDur.textContent = fmt(audio.duration);
});

audio.addEventListener('ended', () => setPlayIcon(false));
audio.addEventListener('play',  () => setPlayIcon(true));
audio.addEventListener('pause', () => setPlayIcon(false));

playBtn.addEventListener('click', () => {
  if (audio.paused) audio.play().catch(()=>{});
  else audio.pause();
});

progBar.addEventListener('click', e => {
  if (!audio.duration) return;
  const r = progBar.getBoundingClientRect();
  audio.currentTime = (e.clientX - r.left) / r.width * audio.duration;
});

// ── Render ─────────────────────────────────────────────────────────────────
let renderTimer = null;
let rendering   = false;

function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(doRender, 500);
}

async function doRender() {
  if (rendering) { scheduleRender(); return; }
  rendering = true;

  const volume   = parseFloat(document.getElementById('k-volume').dataset.value);
  const wet      = parseFloat(document.getElementById('k-wet').dataset.value);
  const decay    = parseFloat(document.getElementById('k-decay').dataset.value);
  const predelay = parseFloat(document.getElementById('k-predelay').dataset.value);

  status.className = 'status rendering';
  status.textContent = 'rendering...';
  playBtn.disabled = true;

  const savedTime  = audio.currentTime || 0;
  const wasPlaying = !audio.paused;
  if (wasPlaying) audio.pause();

  try {
    const t0  = Date.now();
    const res = await fetch('/render', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ volume, wet, decay, predelay })
    });
    const json = await res.json();
    const ms   = Date.now() - t0;

    if (!json.ok) throw new Error(json.log);

    audio.addEventListener('canplay', () => {
      if (savedTime > 0) {
        audio.addEventListener('seeked', () => {
          playBtn.disabled   = false;
          status.className   = 'status ready';
          status.textContent = `ready  ${(ms/1000).toFixed(1)}s`;
          if (wasPlaying) audio.play().catch(()=>{});
        }, { once: true });
        audio.currentTime = savedTime;
      } else {
        playBtn.disabled   = false;
        status.className   = 'status ready';
        status.textContent = `ready  ${(ms/1000).toFixed(1)}s`;
        if (wasPlaying) audio.play().catch(()=>{});
      }
    }, { once: true });

    audio.src = '/output.wav?t=' + Date.now();
    audio.load();

  } catch (err) {
    status.className  = 'status error';
    status.textContent = 'error';
    playBtn.disabled  = false;
    console.error(err);
  }

  rendering = false;
}

// Initial render on load
doRender();

// ── Oscilloscope ───────────────────────────────────────────────────────────
const canvas  = document.getElementById('scope');
const ctx2d   = canvas.getContext('2d');

let audioCtx  = null;
let analyser  = null;
let scopeBuf  = null;
let rafId     = null;

function initAudioCtx() {
  if (audioCtx) return;
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  scopeBuf = new Uint8Array(analyser.fftSize);
  const src = audioCtx.createMediaElementSource(audio);
  src.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function resizeScope() {
  canvas.width  = canvas.offsetWidth  * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
}

function drawScope() {
  rafId = requestAnimationFrame(drawScope);

  const W = canvas.width, H = canvas.height;
  ctx2d.clearRect(0, 0, W, H);

  // background grid lines
  ctx2d.strokeStyle = '#1c1c1c';
  ctx2d.lineWidth = 1;
  ctx2d.beginPath();
  ctx2d.moveTo(0, H / 2); ctx2d.lineTo(W, H / 2);  // centre
  ctx2d.moveTo(0, H / 4); ctx2d.lineTo(W, H / 4);  // top quarter
  ctx2d.moveTo(0, H * 3/4); ctx2d.lineTo(W, H * 3/4); // bottom quarter
  ctx2d.stroke();

  if (!analyser) return;

  if (!audio.paused) analyser.getByteTimeDomainData(scopeBuf);

  ctx2d.strokeStyle = '#e8622a';
  ctx2d.lineWidth   = 1.5 * devicePixelRatio;
  ctx2d.shadowColor = 'rgba(232,98,42,0.4)';
  ctx2d.shadowBlur  = 4 * devicePixelRatio;
  ctx2d.beginPath();

  const step = W / scopeBuf.length;
  for (let i = 0; i < scopeBuf.length; i++) {
    const y = (1 - scopeBuf[i] / 128) * (H / 2) + H / 2;  // 128=silence → centre
    i === 0 ? ctx2d.moveTo(0, y) : ctx2d.lineTo(i * step, y);
  }
  ctx2d.stroke();
  ctx2d.shadowBlur = 0;
}

// start AudioContext on first play (browser autoplay policy)
playBtn.addEventListener('click', () => {
  initAudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { capture: true });

window.addEventListener('resize', resizeScope);
resizeScope();
drawScope();
</script>
</body>
</html>
